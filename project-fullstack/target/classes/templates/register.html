<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="form-container glass">
            <h2>Create an Account</h2>
            <div th:if="${param.success}" class="alert alert-success">
                Registration successful! <a th:href="@{/login}">Login here</a>
            </div>
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" th:field="*{name}" required>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="alert alert-error" style="padding:0.5rem; margin-top:0.5rem; font-size:0.875rem;"></p>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" required>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="alert alert-error" style="padding:0.5rem; margin-top:0.5rem; font-size:0.875rem;"></p>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" required>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="alert alert-error" style="padding:0.5rem; margin-top:0.5rem; font-size:0.875rem;"></p>
                </div>
                <!-- Dropdown to select role for demo purposes. Ideally, admin role shouldn't be publicly assignable. -->
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" th:field="*{role}">
                        <option value="ROLE_STUDENT">Student</option>
                        <option value="ROLE_ADMIN">Administrator</option>
                    </select>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            <div class="text-center">
                <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
