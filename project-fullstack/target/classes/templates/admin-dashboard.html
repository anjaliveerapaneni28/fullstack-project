<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar glass" style="margin: 2rem;">
        <a href="#" class="nav-brand">Smart Campus Admin</a>
        <div class="nav-links">
            <a th:href="@{/events}" class="nav-link">Manage Events</a>
            <a th:href="@{/admin/events/new}" class="nav-link">Create Event</a>
            <a th:href="@{/profile}" class="nav-link">Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" style="background:none; border:none; color:var(--text-primary); cursor:pointer; font-weight:500;">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h2>Admin Dashboard, <span th:text="${user.name}">Admin</span></h2>
        <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 2rem;">
            <div class="card glass" style="text-align: center;">
                <h3>Total Events</h3>
                <h1 style="font-size: 3rem; margin: 1rem 0; color: var(--primary-color);" th:text="${totalEvents}">0</h1>
                <a th:href="@{/events}" class="btn" style="width: auto;">View All</a>
            </div>
            
            <div class="card glass" style="text-align: center;">
                <h3>Quick Actions</h3>
                <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                    <a th:href="@{/admin/events/new}" class="btn">Create New Event</a>
                </div>
            </div>

            <div class="card glass">
                <h3>Registered Students</h3>
                <div th:if="${allRegistrations.empty}">
                    <p>No student registrations found.</p>
                </div>
                <div style="margin-top: 1rem; overflow-x: auto;" th:if="${!allRegistrations.empty}">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border-color);">
                                <th style="padding: 1rem;">Student Name</th>
                                <th style="padding: 1rem;">Email</th>
                                <th style="padding: 1rem;">Event Name</th>
                                <th style="padding: 1rem;">Reg Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="reg : ${allRegistrations}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <td style="padding: 1rem;" th:text="${reg.studentName}">Name</td>
                                <td style="padding: 1rem;" th:text="${reg.user.email}">Email</td>
                                <td style="padding: 1rem;" th:text="${reg.event.title}">Event</td>
                                <td style="padding: 1rem;" th:text="${#temporals.format(reg.registrationDate, 'yyyy-MM-dd')}">Date</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
