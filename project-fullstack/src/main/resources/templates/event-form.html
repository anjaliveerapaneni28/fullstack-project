<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Form - Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar glass" style="margin: 2rem;">
        <a th:href="@{/dashboard}" class="nav-brand">Smart Campus Admin</a>
        <div class="nav-links">
            <a th:href="@{/events}" class="nav-link">Manage Events</a>
            <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" style="background:none; border:none; color:var(--text-primary); cursor:pointer; font-weight:500;">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="form-container glass" style="max-width: 600px;">
            <h2 th:text="${event.id == null ? 'Create New Event' : 'Edit Event'}">Create Event</h2>
            
            <form th:action="${event.id == null ? '/admin/events' : '/admin/events/' + event.id}" th:object="${event}" method="post">
                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" id="title" th:field="*{title}" required>
                    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="alert alert-error" style="padding:0.5rem; margin-top:0.5rem;"></p>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" rows="4" required></textarea>
                    <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="alert alert-error" style="padding:0.5rem; margin-top:0.5rem;"></p>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" th:field="*{department}" required>
                </div>

                <div class="form-group">
                    <label for="eventType">Event Type</label>
                    <select id="eventType" th:field="*{eventType}" required>
                        <option value="Workshop">Workshop</option>
                        <option value="Seminar">Seminar</option>
                        <option value="Hackathon">Hackathon</option>
                        <option value="Conference">Conference</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" th:field="*{date}" required>
                </div>

                <div class="form-group">
                    <label for="time">Time</label>
                    <input type="time" id="time" th:field="*{time}" required>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" th:field="*{location}" required>
                    <p th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="alert alert-error" style="padding:0.5rem; margin-top:0.5rem;"></p>
                </div>
                
                <div class="form-group">
                    <label for="participationType">Participation Type</label>
                    <select id="participationType" th:field="*{participationType}" required>
                        <option value="Individual">Individual</option>
                        <option value="Team">Team</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="feeAmount">Registration Fee ($)</label>
                    <input type="number" step="0.01" id="feeAmount" th:field="*{feeAmount}">
                    <p style="font-size: 0.8rem; color: var(--text-secondary);">Leave empty or 0 for free events.</p>
                </div>

                <div class="form-group">
                    <label for="totalOpenings">Total Openings / Capacity</label>
                    <input type="number" id="totalOpenings" th:field="*{totalOpenings}">
                    <p style="font-size: 0.8rem; color: var(--text-secondary);">Leave empty for unlimited remaining capacity.</p>
                </div>

                <div style="display:flex; gap:1rem; margin-top: 2rem;">
                    <button type="submit" class="btn">Save Event</button>
                    <a th:href="@{/events}" class="btn" style="background:var(--text-secondary);">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
