<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar glass" style="margin: 2rem;">
        <a href="#" class="nav-brand">Smart Campus</a>
        <div class="nav-links">
            <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
            <a th:href="@{/events}" class="nav-link">Events</a>
            <a th:href="@{/profile}" class="nav-link" style="color: var(--primary-color);">Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" style="background:none; border:none; color:var(--text-primary); cursor:pointer; font-weight:500;">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h2>Your Profile</h2>
        <div class="form-container glass" style="max-width: 600px; margin-top: 2rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <!-- Avatar placeholder -->
                <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--primary-color); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; margin-bottom: 1rem;">
                    <span th:text="${#strings.substring(user.name,0,1)}">U</span>
                </div>
                <h3 th:text="${user.name}" style="margin: 0;">User Name</h3>
                <p th:text="${user.role == T(com.smartcampus.model.Role).ROLE_ADMIN ? 'Administrator' : 'Student'}" style="color: var(--text-secondary); margin-top: 0.5rem;">Role</p>
            </div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:value="${user.name}" readonly style="background: rgba(255,255,255,0.05); cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:value="${user.email}" readonly style="background: rgba(255,255,255,0.05); cursor: not-allowed;">
            </div>
            
            <div th:if="${user.role != T(com.smartcampus.model.Role).ROLE_ADMIN}" class="form-group">
                <label>Events Registered</label>
                <div class="badge" style="display: inline-block; font-size: 1rem; padding: 0.5rem 1rem;" th:text="${user.registrations.size()}">0</div>
            </div>
        </div>
    </div>
</body>
</html>
