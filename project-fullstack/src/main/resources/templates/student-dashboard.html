<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar glass" style="margin: 2rem;">
        <a href="#" class="nav-brand">Smart Campus</a>
        <div class="nav-links">
            <a th:href="@{/events}" class="nav-link">Upcoming Events</a>
            <a th:href="@{/profile}" class="nav-link">Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" style="background:none; border:none; color:var(--text-primary); cursor:pointer; font-weight:500;">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <h2>Welcome, <span th:text="${user.name}">Student</span>!</h2>
        <div class="glass" style="padding: 2rem; margin-top: 2rem;">
            <h3>Your Registered Events</h3>
            <div th:if="${registrations.empty}">
                <p>You haven't registered for any events yet. <a th:href="@{/events}">Browse events</a></p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1.5rem;">
                <div class="card glass" th:each="reg : ${registrations}">
                    <h3 th:text="${reg.event.title}">Event Title</h3>
                    <p><strong>Date:</strong> <span th:text="${reg.event.date}"></span> at <span th:text="${reg.event.time}"></span></p>
                    <p><strong>Location:</strong> <span th:text="${reg.event.location}"></span></p>
                    <p><strong>Registered on:</strong> <span th:text="${#temporals.format(reg.registrationDate, 'yyyy-MM-dd HH:mm')}"></span></p>
                    <p><strong>Payment Status:</strong> <span th:text="${reg.paymentStatus}"></span></p>
                    <span class="badge" th:text="${reg.event.eventType}">Type</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
