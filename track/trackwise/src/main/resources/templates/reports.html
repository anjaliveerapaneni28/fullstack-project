<!DOCTYPE html>
<html>
<head>
    <title>TrackWise Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .sidebar-item {
            transition: all 0.3s ease;
            position: relative;
        }
        .sidebar-item:hover, .sidebar-item.active {
            color: white;
            padding-left: 0.5rem;
        }
        .sidebar-item:before {
            content: '';
            position: absolute;
            left: -1rem;
            top: 50%;
            transform: translateY(-50%);
            height: 0;
            width: 4px;
            background: #3b82f6;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .sidebar-item:hover:before, .sidebar-item.active:before {
            height: 100%;
        }
    </style>
</head>

<body class="text-slate-200 overflow-x-hidden min-h-screen relative">

    <!-- Background glow -->
    <div class="fixed top-0 left-0 w-[500px] h-[500px] bg-blue-900/10 rounded-full blur-[120px] pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-0 right-0 w-[600px] h-[600px] bg-purple-900/10 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>

    <div class="flex h-screen">

        <!-- SIDEBAR -->
        <div class="w-64 glass-panel border-r border-slate-800/60 p-6 flex flex-col z-10">
            
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-500 shadow-lg shadow-blue-500/20 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">TrackWise</h1>
            </div>

            <nav class="space-y-6 flex-1">
                <div class="space-y-2">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Menu</p>
                    <a href="/dashboard" class="sidebar-item block text-slate-400 font-medium">Dashboard</a>
                    <a href="/add-expense" class="sidebar-item block text-slate-400 font-medium">Add Expense</a>
                    <a href="/reports" class="sidebar-item block text-white font-medium active">Reports</a>
                </div>
            </nav>

            <div>
                <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-red-400 transition-colors font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </a>
            </div>

        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 p-10 overflow-y-auto z-10">

            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-bold text-white tracking-tight">Expense Reports</h1>
                    <p class="text-slate-400 mt-1">Detailed view of all your recorded expenses.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="glass-panel px-4 py-2 rounded-lg flex items-center gap-3">
                        <span class="text-sm text-slate-400">Total Spent:</span>
                        <span id="reportTotal" class="text-lg font-bold text-emerald-400">₹0</span>
                    </div>
                </div>
            </header>

            <div class="glass-panel p-8 rounded-2xl shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-semibold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                        All Expenses
                    </h2>
                    <input type="text" id="searchInput" placeholder="Search description..." 
                           class="px-4 py-2 rounded-lg bg-slate-800/50 border border-slate-700/50 outline-none transition-all focus:border-blue-500 text-white placeholder-slate-500 text-sm">
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-sm text-slate-400 border-b border-white/5">
                                <th class="pb-3 font-medium cursor-pointer flex items-center gap-1">Date</th>
                                <th class="pb-3 font-medium">Description</th>
                                <th class="pb-3 font-medium">Category</th>
                                <th class="pb-3 font-medium">Amount</th>
                                <th class="pb-3 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTableBody" class="text-sm">
                            <!-- Dynamic rows here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>

    <script>
        let allExpenses = [];

        function renderTable(data) {
            const tbody = document.getElementById("reportsTableBody");
            tbody.innerHTML = "";
            let total = 0;
            
            data.forEach(e => {
                total += e.amount;
                let tr = document.createElement("tr");
                tr.className = "border-b border-white/5 hover:bg-white/5 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 text-slate-300 font-medium">${e.date}</td>
                    <td class="py-4 text-white">${e.description}</td>
                    <td class="py-4">
                        <span class="px-2 py-1 rounded bg-slate-800 text-slate-300 text-xs border border-white/5">
                            ${e.category ? e.category.name : 'Unknown'}
                        </span>
                    </td>
                    <td class="py-4 text-white font-semibold">₹${e.amount}</td>
                    <td class="py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <a href="/expense/edit/${e.id}" class="px-3 py-1 bg-blue-500/10 text-blue-400 rounded hover:bg-blue-500/20 transition-colors text-xs font-medium">Edit</a>
                            <form action="/expense/delete/${e.id}" method="post" class="inline" onsubmit="return confirm('Are you sure you want to delete this expense?');">
                                <button type="submit" class="px-3 py-1 bg-red-500/10 text-red-400 rounded hover:bg-red-500/20 transition-colors text-xs font-medium">Delete</button>
                            </form>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById("reportTotal").innerHTML = "₹" + total;
        }

        fetch("/dashboard/summary")
            .then(res => res.json())
            .then(data => {
                // sort by date desc
                data.sort((a,b) => new Date(b.date) - new Date(a.date));
                allExpenses = data;
                renderTable(allExpenses);
            })
            .catch(err => console.error("Error fetching expenses: ", err));

        // Simple Search
        document.getElementById("searchInput").addEventListener("keyup", function(e) {
            let term = e.target.value.toLowerCase();
            let filtered = allExpenses.filter(exp => exp.description.toLowerCase().includes(term));
            renderTable(filtered);
        });
    </script>
</body>
</html>
