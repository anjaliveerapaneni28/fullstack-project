<!DOCTYPE html>
<html>
<head>
    <title>TrackWise - Premium Expense Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-mesh {
            background-color: #020617;
            background-image: radial-gradient(at 40% 20%, hsla(228,100%,74%,0.15) 0px, transparent 50%),
                              radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0px, transparent 50%),
                              radial-gradient(at 0% 50%, hsla(355,100%,93%,0.1) 0px, transparent 50%);
            background-attachment: fixed;
            animation: gradient-shift 15s ease infinite alternate;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen text-white flex flex-col justify-center items-center overflow-hidden">

    <!-- Glowing Orb in Background -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="glass-card p-14 rounded-3xl shadow-2xl text-center z-10 max-w-2xl transform transition-transform hover:scale-[1.02] duration-500">
        
        <div class="inline-block p-4 rounded-2xl bg-blue-500/10 border border-blue-500/20 mb-6">
            <svg class="w-12 h-12 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
            </svg>
        </div>

        <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">
            TrackWise Analytics
        </h1>
        
        <p class="mt-4 text-lg md:text-xl text-slate-300 font-light mb-10 max-w-lg mx-auto">
            Experience next-generation expense management. Beautiful aesthetics, powerful relational insights.
        </p>
        
        <div class="flex gap-6 justify-center">
            <a href="/login" class="group relative px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-full overflow-hidden transition-all shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_30px_rgba(37,99,235,0.6)]">
                <span class="relative z-10">Get Started</span>
                <div class="absolute inset-0 h-full w-full transform translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-500 ease-out bg-gradient-to-r from-blue-500 to-indigo-500"></div>
                <span class="absolute inset-0 z-10 flex items-center justify-center translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-500 ease-out">Let's Go</span>
            </a>
            
            <a href="/register" class="px-8 py-4 bg-slate-800/50 hover:bg-slate-700/80 text-white font-semibold rounded-full border border-slate-600/50 hover:border-slate-400 transition-all backdrop-blur-md">
                Create Account
            </a>
        </div>
        
    </div>

</body>
</html>
