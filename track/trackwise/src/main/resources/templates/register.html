<!DOCTYPE html>
<html>
<head>
    <title>TrackWise - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            border-color: rgba(16, 185, 129, 0.8);
        }
    </style>
</head>
<body class="min-h-screen text-slate-200 overflow-hidden flex relative">

    <div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-emerald-600/20 blur-[100px] pointer-events-none"></div>
    <div class="absolute top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-teal-600/10 blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md m-auto transform duration-500 hover:scale-[1.01]">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-semibold tracking-tight text-white mb-2">Create Account</h1>
            <p class="text-slate-400">Join TrackWise to manage expenses smartly</p>
        </div>

        <div class="glass-panel p-10 rounded-3xl relative">
            <form action="/registerUser" method="post" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Full Name</label>
                    <input name="name" type="text" placeholder="John Doe" required
                        class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 outline-none transition-all input-glow text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Email address</label>
                    <input name="email" type="email" placeholder="name@company.com" required
                        class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 outline-none transition-all input-glow text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Password</label>
                    <input name="password" type="password" placeholder="••••••••" required
                        class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3 outline-none transition-all input-glow text-white placeholder-slate-500">
                </div>
                
                <button type="submit" class="w-full mt-6 bg-gradient-to-tr from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white font-medium rounded-xl py-3.5 relative overflow-hidden transition-all shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                    Register Now
                </button>

            </form>
            
            <p class="text-center mt-6 text-sm text-slate-400">
                Already have an account? <a href="/login" class="text-emerald-400 font-medium hover:text-emerald-300 transition-colors">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
