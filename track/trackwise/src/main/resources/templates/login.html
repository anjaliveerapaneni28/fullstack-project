<!DOCTYPE html>
<html>
<head>
    <title>TrackWise - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="min-h-screen text-slate-200 overflow-hidden flex relative relative">

    <!-- Animated background accents -->
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-indigo-600/20 blur-[100px] pointer-events-none"></div>
    <div class="absolute top-[60%] -right-[10%] w-[60%] h-[60%] rounded-full bg-blue-600/10 blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md m-auto transform duration-500 hover:scale-[1.01]">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-semibold tracking-tight text-white mb-2">Welcome Back</h1>
            <p class="text-slate-400">Sign in to your TrackWise dashboard</p>
        </div>

        <div class="glass-panel p-10 rounded-3xl relative">
            <form action="/dashboard" method="GET" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Email address</label>
                    <input name="email" type="email" placeholder="name@company.com" required
                        class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3.5 outline-none transition-all input-glow text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
                    <input name="password" type="password" placeholder="••••••••" required
                        class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl px-4 py-3.5 outline-none transition-all input-glow text-white placeholder-slate-500">
                </div>
                
                <div class="flex items-center justify-between text-sm mt-2">
                    <label class="flex items-center text-slate-400 gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded bg-slate-800 border-slate-700 text-blue-500 focus:ring-blue-500">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-gradient-to-tr from-blue-600 to-indigo-500 hover:from-blue-500 hover:to-indigo-400 text-white font-medium rounded-xl py-3.5 relative overflow-hidden group shadow-[0_0_15px_rgba(59,130,246,0.3)] transition-all">
                    Sign in to Account
                </button>

            </form>
            
            <p class="text-center mt-8 text-sm text-slate-400">
                Don't have an account? <a href="/register" class="text-blue-400 font-medium hover:text-blue-300">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
