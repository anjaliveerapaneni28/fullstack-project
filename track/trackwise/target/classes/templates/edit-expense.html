<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TrackWise - Edit Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.8);
        }
    </style>
</head>

<body class="min-h-screen text-slate-200 overflow-x-hidden relative">

    <!-- Background accents -->
    <div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-blue-900/20 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[10%] w-[50%] h-[50%] rounded-full bg-indigo-900/10 blur-[150px] pointer-events-none"></div>

    <!-- NAVBAR -->
    <div class="glass-panel border-b border-white/5 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-indigo-500 shadow-lg shadow-blue-500/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">TrackWise</h1>
        </div>
        <a href="/dashboard" class="flex items-center gap-2 text-sm font-medium bg-slate-800/50 hover:bg-slate-700 border border-slate-700/50 px-5 py-2.5 rounded-lg transition-all text-white shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Dashboard
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex justify-center items-center py-16 px-4 z-10 relative">
        <div class="glass-panel rounded-3xl p-10 w-full max-w-xl">
            
            <div class="text-center mb-10">
                <div class="w-14 h-14 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-indigo-500/20">
                    <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-tight">Edit Expense</h2>
                <p class="text-slate-400 mt-2 text-sm">Update your expense record details below</p>
            </div>

            <form th:action="@{/expense/update/{id}(id=${expense.id})}" method="post" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Amount -->
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1.5">Amount (₹)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">₹</span>
                            <input type="number" name="amount" th:value="${expense.amount}" required
                                class="w-full pl-8 pr-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700/50 outline-none transition-all input-glow text-white placeholder-slate-600 font-medium">
                        </div>
                    </div>

                    <!-- Date -->
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1.5">Date</label>
                        <input type="date" name="date" th:value="${expense.date}" required
                            class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700/50 outline-none transition-all input-glow text-white [color-scheme:dark]">
                    </div>
                </div>

                <!-- Category -->
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Category</label>
                    <select name="categoryId"
                        class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700/50 outline-none transition-all input-glow text-white appearance-none cursor-pointer">
                        <option value="1" th:selected="${expense.category.id == 1}">🍔 Food & Dining</option>
                        <option value="2" th:selected="${expense.category.id == 2}">🚗 Travel & Transport</option>
                        <option value="3" th:selected="${expense.category.id == 3}">💡 Bills & Utilities</option>
                        <option value="4" th:selected="${expense.category.id == 4}">🛍️ Shopping</option>
                        <option value="5" th:selected="${expense.category.id == 5}">✨ Others</option>
                    </select>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Notes / Description</label>
                    <textarea name="description" rows="3" th:text="${expense.description}"
                        class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700/50 outline-none transition-all input-glow text-white placeholder-slate-600 resize-none"></textarea>
                </div>

                <!-- BUTTON -->
                <button type="submit"
                    class="w-full mt-4 bg-gradient-to-tr from-indigo-600 to-purple-500 hover:from-indigo-500 hover:to-purple-400 text-white font-medium rounded-xl py-4 relative overflow-hidden group shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-all flex justify-center items-center gap-2">
                    <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Update Expense Record
                </button>

            </form>

        </div>
    </div>

</body>
</html>
