<!DOCTYPE html>
<html>
<head>
    <title>TrackWise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .sidebar-item {
            transition: all 0.3s ease;
            position: relative;
        }
        .sidebar-item:hover {
            color: white;
            padding-left: 0.5rem;
        }
        .sidebar-item:before {
            content: '';
            position: absolute;
            left: -1rem;
            top: 50%;
            transform: translateY(-50%);
            height: 0;
            width: 4px;
            background: #3b82f6;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .sidebar-item:hover:before {
            height: 100%;
        }
    </style>
</head>

<body class="text-slate-200 overflow-x-hidden min-h-screen relative">

    <!-- Background glow -->
    <div class="fixed top-0 left-0 w-[500px] h-[500px] bg-blue-900/10 rounded-full blur-[120px] pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-0 right-0 w-[600px] h-[600px] bg-purple-900/10 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>

    <div class="flex h-screen">

        <!-- SIDEBAR -->
        <div class="w-64 glass-panel border-r border-slate-800/60 p-6 flex flex-col z-10">
            
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-500 shadow-lg shadow-blue-500/20 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">TrackWise</h1>
            </div>

            <nav class="space-y-6 flex-1">
                <div class="space-y-2">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Menu</p>
                    <a href="/dashboard" class="sidebar-item block text-slate-400 font-medium">Dashboard</a>
                    <a href="/add-expense" class="sidebar-item block text-slate-400 font-medium">Add Expense</a>
                    <a href="#" class="sidebar-item block text-slate-400 font-medium">Reports</a>
                </div>
            </nav>

            <div>
                <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-red-400 transition-colors font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </a>
            </div>

        </div>


        <!-- MAIN CONTENT -->
        <div class="flex-1 p-10 overflow-y-auto z-10">

            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-bold text-white tracking-tight">Financial Overview</h1>
                    <p class="text-slate-400 mt-1">Monitor your relational analytics seamlessly.</p>
                </div>
            </header>

            <!-- CARDS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">

                <div class="glass-panel p-6 rounded-2xl shadow-xl border-l-[4px] border-l-blue-500 transform hover:translate-y-[-4px] transition-transform duration-300">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium text-slate-400 mb-1">Total Expenses</p>
                            <h2 id="total" class="text-4xl font-bold text-white tracking-tight">₹0</h2>
                        </div>
                        <div class="p-3 bg-blue-500/10 rounded-lg">
                            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-2xl shadow-xl border-l-[4px] border-l-purple-500 transform hover:translate-y-[-4px] transition-transform duration-300">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium text-slate-400 mb-1">This Month</p>
                            <h2 class="text-4xl font-bold text-white tracking-tight">₹0</h2>
                        </div>
                        <div class="p-3 bg-purple-500/10 rounded-lg">
                            <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-2xl shadow-xl border-l-[4px] border-l-emerald-500 transform hover:translate-y-[-4px] transition-transform duration-300">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium text-slate-400 mb-1">Top Category</p>
                            <h2 class="text-4xl font-bold text-white tracking-tight">Food</h2>
                        </div>
                        <div class="p-3 bg-emerald-500/10 rounded-lg">
                            <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        </div>
                    </div>
                </div>

            </div>

            <!-- CHARTS -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

                <div class="glass-panel p-8 rounded-2xl shadow-xl">
                    <h2 class="mb-6 font-semibold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                        Category Distribution
                    </h2>
                    <div class="relative h-64 w-full flex justify-center">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>

                <div class="glass-panel p-8 rounded-2xl shadow-xl">
                    <h2 class="mb-6 font-semibold text-white flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                        Monthly Spending
                    </h2>
                    <div class="relative h-64 w-full">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script>
        // Use futuristic chart colors globally
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';

        fetch("/dashboard/summary")
            .then(res => res.json())
            .then(data => {
                let total = 0;
                data.forEach(e => {
                    total += e.amount;
                });
                document.getElementById("total").innerHTML = "₹" + total;

                /* PIE CHART */
                new Chart(document.getElementById("pieChart"), {
                    type: "doughnut",
                    data: {
                        labels: ["Food", "Travel", "Bills", "Shopping"],
                        datasets: [{
                            data: [30, 20, 25, 25],
                            backgroundColor: [
                                'rgba(59, 130, 246, 0.8)',
                                'rgba(168, 85, 247, 0.8)',
                                'rgba(16, 185, 129, 0.8)',
                                'rgba(244, 63, 94, 0.8)'
                            ],
                            borderColor: '#0f172a',
                            borderWidth: 2,
                            hoverOffset: 4
                        }]
                    },
                    options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right' } } }
                });

                /* BAR CHART */
                new Chart(document.getElementById("barChart"), {
                    type: "bar",
                    data: {
                        labels: ["Jan", "Feb", "Mar", "Apr"],
                        datasets: [{
                            label: "Expenses",
                            data: [5000, 3000, 7000, 4000],
                            backgroundColor: 'rgba(99, 102, 241, 0.8)',
                            borderRadius: 6,
                            borderWidth: 0,
                            barPercentage: 0.6
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false } },
                            x: { grid: { display: false } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            })
            .catch(err => {
                // If endpoint fails, render dummy data for demonstration
                document.getElementById("total").innerHTML = "₹19000";
                new Chart(document.getElementById("pieChart"), {
                    type: "doughnut",
                    data: {
                        labels: ["Food", "Travel", "Bills", "Shopping"],
                        datasets: [{
                            data: [30, 20, 25, 25],
                            backgroundColor: ['#3b82f6', '#a855f7', '#10b981', '#f43f5e'],
                            borderColor: '#020617',
                            borderWidth: 2
                        }]
                    },
                    options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                });
                new Chart(document.getElementById("barChart"), {
                    type: "bar",
                    data: {
                        labels: ["Jan", "Feb", "Mar", "Apr"],
                        datasets: [{
                            label: "Expenses",
                            data: [5000, 3000, 7000, 4000],
                            backgroundColor: 'rgba(99, 102, 241, 0.8)',
                            borderRadius: 6,
                            barPercentage: 0.5
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } },
                        plugins: { legend: { display: false } }
                    }
                });
            });
    </script>
</body>
</html>
